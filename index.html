<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cobrança - Controle Total</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>Gestor de Crédito Pessoal</h1>
        <p>Verde = Pago | Vermelho = Atrasado</p>
    </header>

    <section class="cadastro-section">
        <h2>Novo Empréstimo</h2>
        <div class="grid-form">
            <div class="form-group">
                <label>Nome do Cliente</label>
                <input type="text" id="nome" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="number" id="whatsapp" placeholder="Ex: 83999999999">
            </div>
            <div class="form-group">
                <label>Valor Capital (R$)</label>
                <input type="number" id="valor" placeholder="Ex: 100.00">
            </div>
            <div class="form-group">
                <label>Juros (%)</label>
                <input type="number" id="juros" value="20">
            </div>
            <div class="form-group">
                <label>Frequência</label>
                <select id="frequencia">
                    <option value="diario">Diário</option>
                    <option value="semanal">Semanal</option>
                    <option value="mensal">Mensal</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nº de Parcelas</label>
                <input type="number" id="parcelas" value="20">
            </div>
            <div class="form-group">
                <label>Data de Início</label>
                <input type="date" id="dataInicio">
            </div>
            <div class="btn-group">
                <button id="btnSalvar" class="btn-save">CADASTRAR EMPRÉSTIMO</button>
            </div>
        </div>
    </section>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Prazos</th>
                    <th>Financeiro & Parcelas</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaClientes"></tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
