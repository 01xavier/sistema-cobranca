<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cobrança - Limpo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <header>
        <h1>Gestor de Cobrança</h1>
        <p>Clique 1x: Pago (Verde) | Clique 2x: Atrasado (Vermelho)</p>
    </header>

    <div class="formulario">
        <input type="text" id="nome" placeholder="Nome do Cliente">
        <input type="number" id="whatsapp" placeholder="WhatsApp (DDD)">
        <input type="number" id="valor" placeholder="Valor Capital (R$)">
        <input type="number" id="juros" placeholder="Juros %" value="20">
        <input type="number" id="parcelas" placeholder="Dias/Parcelas" value="20">
        <select id="frequencia">
            <option value="diario">Diário</option>
            <option value="semanal">Semanas</option>
        </select>
        <button id="btnSalvar">CADASTRAR</button>
    </div>

    <div class="tabela-area">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Valor Total</th>
                    <th>Controle de Parcelas</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
</div>


<script src="script.js"></script>


</body>
</html>
